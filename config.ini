[common]
main_mode=1
failed_output_folder=failed
success_output_folder=JAV_output
soft_link=0
failed_move=0
auto_exit=1

[proxy]
;proxytype: http or socks5 or socks5h
type=http
proxy=127.0.0.1:1080
timeout=10
retry=3

[Name_Rule]
location_rule = studio
naming_rule = number+' '+title

[update]
update_check=0

[priority]
website=missav

[escape]
literals=\()/
folders=failed,JAV_output

[debug_mode]
switch=0
